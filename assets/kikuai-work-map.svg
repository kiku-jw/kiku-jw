<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="520" viewBox="0 0 1280 520" role="img" aria-labelledby="title desc">
  <title id="title">KikuAI work map</title>
  <desc id="desc">A visual map of KikuAI tools moving from messy inputs to useful artifacts.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#09090a"/>
      <stop offset="0.58" stop-color="#101114"/>
      <stop offset="1" stop-color="#15120f"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" x2="1">
      <stop offset="0" stop-color="#f6f0e4"/>
      <stop offset="1" stop-color="#d8c7a5"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1280" height="520" rx="0" fill="url(#bg)"/>
  <path d="M0 390 C180 340 320 410 500 365 C710 310 855 330 1020 295 C1120 274 1210 250 1280 280 L1280 520 L0 520 Z" fill="#0f1012"/>
  <path d="M82 102 H326 M82 145 H250 M82 188 H304" stroke="#2f2d29" stroke-width="2" stroke-linecap="round"/>
  <path d="M976 89 H1198 M1012 132 H1198 M944 175 H1198" stroke="#2f2d29" stroke-width="2" stroke-linecap="round"/>

  <g transform="translate(72 62)">
    <text x="0" y="0" fill="#f6f0e4" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="56" font-weight="700">Nick / KikuAI</text>
    <text x="0" y="48" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="24">small useful tools for files, transcripts, feeds, links, logs, and agent workflows</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="72" y="176" width="274" height="198" rx="8" fill="#121316" stroke="#272621"/>
    <text x="96" y="214" fill="#d8c7a5" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="1.6">INPUTS</text>
    <text x="96" y="252" fill="#f3eee6" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="700">messy real work</text>
    <text x="96" y="290" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">XLF import errors</text>
    <text x="96" y="320" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">long media files</text>
    <text x="96" y="350" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">feeds, links, logs, text</text>

    <rect x="503" y="150" width="274" height="250" rx="8" fill="#151518" stroke="#373020"/>
    <text x="527" y="188" fill="#d8c7a5" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="1.6">METHOD</text>
    <text x="527" y="226" fill="#f3eee6" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="700">working previews first</text>
    <text x="527" y="264" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">browser-local when possible</text>
    <text x="527" y="294" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">one input, one result</text>
    <text x="527" y="324" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">evidence before expansion</text>
    <rect x="527" y="348" width="98" height="28" rx="8" fill="#252018" stroke="#5b4b30"/>
    <text x="548" y="368" fill="#f6f0e4" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">try it</text>
    <rect x="637" y="348" width="116" height="28" rx="8" fill="#1b2027" stroke="#34415a"/>
    <text x="658" y="368" fill="#c9d6ff" font-family="Inter, ui-sans-serif, system-ui" font-size="14" font-weight="700">measure</text>

    <rect x="934" y="176" width="274" height="198" rx="8" fill="#121316" stroke="#272621"/>
    <text x="958" y="214" fill="#d8c7a5" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="700" letter-spacing="1.6">ARTIFACTS</text>
    <text x="958" y="252" fill="#f3eee6" font-family="Inter, ui-sans-serif, system-ui" font-size="25" font-weight="700">proof people can use</text>
    <text x="958" y="290" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">repair files and reports</text>
    <text x="958" y="320" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">SRT, VTT, transcripts</text>
    <text x="958" y="350" fill="#a8a29a" font-family="Inter, ui-sans-serif, system-ui" font-size="18">clean exports and rules</text>
  </g>

  <path d="M365 276 H478" stroke="url(#warm)" stroke-width="3" stroke-linecap="round"/>
  <path d="M468 266 L480 276 L468 286" fill="none" stroke="#d8c7a5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M796 276 H909" stroke="url(#warm)" stroke-width="3" stroke-linecap="round"/>
  <path d="M899 266 L911 276 L899 286" fill="none" stroke="#d8c7a5" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <g transform="translate(72 426)">
    <rect x="0" y="0" width="198" height="42" rx="8" fill="#191817" stroke="#363028"/>
    <text x="18" y="27" fill="#f6f0e4" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">XLIFF Doctor</text>
    <rect x="214" y="0" width="218" height="42" rx="8" fill="#191817" stroke="#263042"/>
    <text x="232" y="27" fill="#dce5ff" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Long Video Transcriber</text>
    <rect x="448" y="0" width="190" height="42" rx="8" fill="#191817" stroke="#3b3324"/>
    <text x="466" y="27" fill="#f0d8aa" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Revenue Link QA</text>
    <rect x="654" y="0" width="214" height="42" rx="8" fill="#191817" stroke="#31382f"/>
    <text x="672" y="27" fill="#d7ead8" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Merchant Feed Check</text>
    <rect x="884" y="0" width="150" height="42" rx="8" fill="#191817" stroke="#352d42"/>
    <text x="902" y="27" fill="#e0d4ff" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Spam Patterns</text>
    <rect x="1050" y="0" width="150" height="42" rx="8" fill="#191817" stroke="#263042"/>
    <text x="1068" y="27" fill="#dce5ff" font-family="Inter, ui-sans-serif, system-ui" font-size="16" font-weight="700">Text Cleanup</text>
  </g>
</svg>
